services:
  postgres:
    image: postgres:16
    container_name: monad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow
    ports:
      - "5433:5432"
    volumes:
      - monad-postgres:/var/lib/postgresql/data

volumes:
  monad-postgres:
